# melpazoid <https://github.com/riscy/melpazoid> build checks.

# If your package is on GitHub, enable melpazoid's checks by copying this file
# to .github/workflows/melpazoid.yml and modifying RECIPE and EXIST_OK below.
---
name: melpazoid
'on': [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        emacs_version:
          - 29.1
          - 29.2
          - 29.3
          - 29.4
          - 30.1
          - release-snapshot
    steps:
      - name: Get repo to access in conteiner
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Install melpazoid
        run: |
          python -m pip install --upgrade pip
          # sudo apt-get install emacs-nox && emacs --version
          git clone https://github.com/riscy/melpazoid.git ~/melpazoid
          pip install ~/melpazoid
      - name: Install Emacs
        uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs_version }}

      - name: Tests async
        run: |
         emacs -Q --batch --no-site-file -l ert.el -l cui-async1.el -l ./tests/cui-tests-async1.el -f ert-run-tests-batch-and-exit
      - name: Tests timers
        run: |
         emacs -Q --batch --no-site-file -l ert.el -l cui-debug.el -l cui-timers.el -l ./tests/cui-tests-timers.el -f ert-run-tests-batch-and-exit
      - name: Tests block
        run: |
         emacs -Q --batch --no-site-file -l ert.el -l cui-debug.el -l cui-block.el -l ./tests/cui-tests-block.el -f ert-run-tests-batch-and-exit
      - name: Tests block msgs
        run: |
         emacs -Q --batch --no-site-file -l ert.el -l cui-debug.el -l cui-block.el -l cui-block-msgs.el -l cui-block-tags.el -l ./tests/cui-tests-msgs.el -f ert-run-tests-batch-and-exit
      - name: Tests block tags
        run: |
         emacs -Q --batch --no-site-file -l ert.el -l cui-debug.el -l cui-block.el -l cui-block-msgs.el -l cui-block-tags.el -l ./tests/cui-tests-block-tags.el -f ert-run-tests-batch-and-exit
         pushd ..
         git clone --depth=1 https://github.com/Anoncheg1/emacs-org-links.git
         popd
         emacs -Q --batch --no-site-file -l ert.el -l cui-debug.el -l ../emacs-org-links/org-links.el -l cui-block.el -l cui-block-msgs.el -l cui-block-tags.el -l ./tests/cui-tests-block-tags.el -f ert-run-tests-batch-and-exit
      - name: Tests restapi
        run: |
         emacs -Q --batch --no-site-file -l ert.el -l cui-debug.el -l cui-block.el -l cui-block-msgs.el -l cui-block-tags.el -l cui-timers.el -l cui-async1.el -l cui-restapi.el -l ./tests/cui-tests-restapi.el -f ert-run-tests-batch-and-exit
      - name: Tests optional
        run: |
         emacs -Q --batch --no-site-file -l ert.el -l cui-debug.el -l cui-block.el -l cui-optional.el -l ./tests/cui-tests-optional.el -f ert-run-tests-batch-and-exit
      - name: Tests prompt
        run: |
         emacs -Q --batch --no-site-file -l ert.el -l cui-debug.el -l cui-block.el -l cui-block-msgs.el -l cui-block-tags.el -l cui-timers.el -l cui-async1.el -l cui-restapi.el -l cui-prompt.el -l ./tests/cui-tests-prompt.el -f ert-run-tests-batch-and-exit
      - name: Tests cui
        run: |
         emacs -Q --batch --no-site-file -l ert.el -l cui-debug.el -l cui-block.el -l cui-block-msgs.el -l cui-block-tags.el -l cui-timers.el -l cui-async1.el -l cui-restapi.el -l cui-prompt.el -l ../emacs-org-links/org-links.el -l cui.el -l ./tests/cui-tests-cui.el -f ert-run-tests-batch-and-exit
      - name: Tests integ
        run: |
         emacs -Q --batch --no-site-file -l ert.el -l cui-debug.el -l cui-block.el -l cui-block-msgs.el -l cui-block-tags.el -l cui-timers.el -l cui-async1.el -l cui-restapi.el -l cui-prompt.el -l cui.el -l ./tests/cui-tests-block.el -l ./tests/cui-tests-integ.el -f ert-run-tests-batch-and-exit
      # - name: Tests integllm - cause timeout fail
      #   run: |
      #    emacs -Q --batch --no-site-file -l ert.el -l cui-debug.el -l cui-block.el -l cui-block-msgs.el -l cui-block-tags.el -l cui-timers.el -l cui-async1.el -l cui-restapi.el -l cui-prompt.el -l cui.el -l ./tests/cui-tests-integllm.el -f ert-run-tests-batch-and-exit

      - name: Run
        env:
          LOCAL_REPO: ${{ github.workspace }}
          # RECIPE is your recipe as written for MELPA:
          RECIPE: (cui :fetcher github :repo "Anoncheg1/emacs-cui")
          # set this to false (or remove it) if the package isn't on MELPA:
          EXIST_OK: true
        run: |
          echo $GITHUB_REF
          make -C ~/melpazoid |& tee output.log
          [ $? -ne 0 ] && { echo "Make command failed, failing workflow"; exit 1; }
          if grep -q "Warning" output.log ; then
            echo "Warnings detected, failing workflow" ; exit 1
          fi
          if grep -q ': error: ' output.log ; then
            echo "Error detected, failing workflow" ; exit 1
          fi
          if grep -q ' with [melpazoid]' output.log ; then
            echo "Melpazoid warning detected, failing workflow" ; exit 1
          fi
          if grep -q ' with package-lint ' output.log ; then
            echo "Checkdoc warning detected, failing workflow" ; exit 1
          fi
          if grep -q ' with checkdoc ' output.log ; then
            echo "Checkdoc warning detected, failing workflow" ; exit 1
          fi
